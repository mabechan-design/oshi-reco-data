name: 公演情報とアーティストを週1回自動取得

on:
  schedule:
    # 毎週月曜 6:00 JST（日曜 21:00 UTC）に実行
    - cron: '0 21 * * 0'
  workflow_dispatch: # 手動実行ボタンも有効にする

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 依存パッケージをインストール
        run: npm install

      - name: Playwright ブラウザをインストール
        run: npx playwright install chromium --with-deps

      - name: スクレイピング実行
        run: node scraper.mjs

      - name: デバッグHTML を保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-talent
          path: debug_talent.html
          if-no-files-found: ignore

      - name: lives.json をコミット・プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lives.json artists.json
          git diff --staged --quiet || git commit -m "chore: 公演・アーティスト情報を自動更新 $(date '+%Y-%m-%d')"
          git push
